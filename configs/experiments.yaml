# Experiment configuration — mirrors the stage CLI defaults so a run is fully
# described by (this file, configs/models.yaml, the stage manifests).
# The CLIs take precedence; this file documents the canonical settings.

global:
  seed: 42
  dev_model: deepseek-coder-1.3b       # local/MPS smoke + first full pass
  main_model: deepseek-coder-6.7b      # cluster main-results model
  replication_model: starcoder2-3b     # optional architecture replication

stage00_data:
  core:            {n_binding: 200, n_taint: 200, n_shadow: 100}
  context:         {n_bases: 40, filler_sizes: [0, 50, 100, 200, 500, 1000],
                    filler_types: [comment_prose, dead_code, lexical_decoy,
                                   competing_update, scope_shadow]}
  minimal_pairs:   {n: 40}             # only length-matched pairs are kept
  obfuscation:     {n_bases: 40, levels: [normalize, rename, opaque, encode, flatten]}
                                       # cumulative ladder; every variant execution-verified
  real:            {n: 200, source: code_search_net/python, split: validation}

stage10_extract:
  max_length: 1024                     # 2048 for context.jsonl
  dtype: float16
  layers: registry                     # ModelConfig.probe_layers per model

stage20_probes:                        # E1-E4 (+E8 on the real store)
  tasks: [lexical_token_type, binding, defuse_edge, control_dep, taint_state]
  probe: linear                        # linear only, by design
  C: 0.1
  max_iter: 2000
  tol: 1.0e-3
  cv_folds: 5
  max_samples: 20000                   # per (task, layer), group-level cap
  selectivity_control: true            # labels shuffled within source example
  negative_strata: [same_name_diff_binding, diff_name, distance_matched]

stage30_context:                       # E5
  tasks: [binding, defuse_edge]
  probes: frozen_from_stage20          # never retrained on variants

stage31_obfuscation:                   # E9
  tasks: [binding, defuse_edge]
  probes: frozen_from_stage20          # never retrained on variants

stage40_leadtime:                      # E6
  n_examples: 100
  calib_frac: 0.3                      # examples used only for threshold calibration
  layer: auto                          # best taint_state selectivity from stage 20

stage50_patching:                      # E7
  max_pairs: 100
  positions: [sink_arg, sanitizer_def, last_token]
  recovery_threshold: 0.5              # encoded_and_used cutoff on logit-diff recovery
